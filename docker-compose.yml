# Jung Compose stack: runtime API packaging only.
# Manual user testing reuses the single parameterized api service under an
# isolated Compose project and data directory (see Makefile ui-console-test).

x-api-runtime: &api-runtime
  build:
    context: .
    dockerfile: Dockerfile
    target: runtime
  user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
  volumes:
    - "${JUNG_HOST_DATA_DIR:-./data}:/app/data"
    - ./logs:/app/logs
  environment: &api-environment
    PYTHONUNBUFFERED: "1"
    JUNG_API_HOST: 0.0.0.0
    JUNG_API_PORT: "8000"
    JUNG_API_ALLOW_REMOTE_BIND: "true"
    UV_CACHE_DIR: /tmp/uv_cache
    XDG_CACHE_HOME: /tmp/.cache
  networks:
    - app-network
  command: jung-api
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"
  healthcheck:
    test: ["CMD", "wget", "--no-verbose", "--tries=1", "-O", "/dev/null", "http://localhost:8000/api/v1/health"]
    interval: 2s
    timeout: 2s
    retries: 15
    start_period: 5s

services:
  api:
    <<: *api-runtime
    environment:
      <<: *api-environment
      JUNG_DATA_DIR: ${JUNG_DATA_DIR:-/app/data/local}
    env_file:
      - path: ${ENV_FILE:-.env}
        required: false
    ports:
      - "127.0.0.1:${JUNG_API_HOST_PORT:-8000}:8000"

networks:
  app-network:
    driver: bridge
