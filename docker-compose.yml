services:
  app:
    build: .
    container_name: psychoanalyst_app
    volumes:
      # Mount the data volume for SQLite and vector DB persistence
      - ./src/data:/app/data
    env_file:
      # Pass environment variables from a .env file
      - .env
    stdin_open: true
    tty: true

  app-test:
    build: .
    container_name: psychoanalyst_app_test
    volumes:
      # Mount the data volume for SQLite and vector DB persistence
      - ./src/data:/app/data
    environment:
      # Set test environment
      - APP_ENV=testing
    env_file:
      # Pass environment variables from a .env file
      - .env
    stdin_open: true
    tty: true
