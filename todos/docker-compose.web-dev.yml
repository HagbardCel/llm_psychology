version: '3.8'

services:
  # Backend API server for web interface
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: psychoanalyst_backend_dev
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./src:/app/src
      - ./tests:/app/tests
    env_file:
      - .env
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - APP_ENV=development
    command: python src/api_server.py
    restart: unless-stopped

  # WebSocket server for real-time communication
  websocket:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: psychoanalyst_websocket_dev
    ports:
      - "8765:8765"
    volumes:
      - ./data:/app/data
      - ./src:/app/src
    env_file:
      - .env
    environment:
      - WEBSOCKET_HOST=0.0.0.0
      - WEBSOCKET_PORT=8765
      - APP_ENV=development
    command: python src/websocket_server/local_websocket.py
    restart: unless-stopped

  # React frontend (development with hot reload)
  frontend-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: psychoanalyst_frontend_dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/package.json:/app/package.json
      - ./frontend/package-lock.json:/app/package-lock.json
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - ./frontend/vite.config.ts:/app/vite.config.ts
    depends_on:
      - backend
      - websocket
    restart: unless-stopped
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_WEBSOCKET_URL=http://localhost:8765

networks:
  default:
    name: psychoanalyst_web_dev_network