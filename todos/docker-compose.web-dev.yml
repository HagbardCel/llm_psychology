version: '3.8'

services:
  # Unified server (REST API + WebSocket)
  unified-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: psychoanalyst_unified_server_dev
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./src:/app/src
      - ./tests:/app/tests
    env_file:
      - .env
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - APP_ENV=development
    command: python -m psychoanalyst_app.server
    restart: unless-stopped

  # React frontend (development with hot reload)
  frontend-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: psychoanalyst_frontend_dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/package.json:/app/package.json
      - ./frontend/package-lock.json:/app/package-lock.json
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - ./frontend/vite.config.ts:/app/vite.config.ts
    depends_on:
      - unified-server
    restart: unless-stopped
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_WEBSOCKET_URL=http://localhost:8000

networks:
  default:
    name: psychoanalyst_web_dev_network