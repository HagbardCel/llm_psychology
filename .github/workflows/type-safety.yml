name: Type Safety Validation

on:
  push:
    branches: [master, main, develop]
    paths:
      - 'src/psychoanalyst_app/models/**'
      - 'src/psychoanalyst_app/orchestration/models.py'
      - 'src/psychoanalyst_app/schemas/**'
      - 'src/psychoanalyst_app/utils/ws_protocol.py'
      - 'console-ui/src/websocket_protocol.py'
      - 'scripts/generate_ws_protocol.py'
      - 'scripts/validate_schemas.py'
      - 'schemas/ws_protocol.json'
      - 'Makefile'
      - 'docker-compose.yml'
  pull_request:
    branches: [master, main, develop]

jobs:
  contracts:
    name: Validate Backend And Console Contracts
    runs-on: ubuntu-latest
    env:
      ENV_FILE: .env.example

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate and validate transient JSON schemas
        run: make validate-schemas

      - name: Validate generated WebSocket protocol constants
        run: make validate-generated-contracts

      - name: Check whitespace and stale generated diffs
        run: git diff --check && git diff --exit-code
