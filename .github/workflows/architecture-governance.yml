name: Architecture Governance Validation

on:
  push:
    branches: [master, main, develop]
    paths:
      - 'src/psychoanalyst_app/**'
      - 'scripts/check_architecture_budgets.py'
      - 'Makefile'
  pull_request:
    branches: [master, main, develop]
    paths:
      - 'src/psychoanalyst_app/**'
      - 'scripts/check_architecture_budgets.py'
      - 'Makefile'

jobs:
  validate-architecture:
    name: Validate Architecture Budgets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run architecture governance checks
        run: python scripts/check_architecture_budgets.py
