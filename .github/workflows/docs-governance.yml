name: Docs Governance Validation

on:
  push:
    branches: [master, main, develop]
    paths:
      - 'docs/**'
      - 'scripts/validate_docs_metadata.py'
      - 'Makefile'
  pull_request:
    branches: [master, main, develop]
    paths:
      - 'docs/**'
      - 'scripts/validate_docs_metadata.py'
      - 'Makefile'

jobs:
  validate-docs:
    name: Validate Active Docs Metadata
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate docs metadata and index
        run: python scripts/validate_docs_metadata.py
