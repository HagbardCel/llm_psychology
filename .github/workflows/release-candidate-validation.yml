name: Release Candidate Validation

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]

jobs:
  finalization-check:
    name: Docker Finalization Check
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Docker release-candidate gate
        run: make finalization-check

      - name: Check whitespace and stale generated diffs
        run: git diff --check && git diff --exit-code
