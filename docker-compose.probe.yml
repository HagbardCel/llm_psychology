services:
  api-probe:
    extends:
      file: docker-compose.yml
      service: api
    container_name: therapist_api_probe
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    environment:
      - APP_ENV=development
      - DATABASE_PATH=/app/logs/workflow-probes/${PROBE_RUN_NAME}/runtime.sqlite
      - LLM_PROVIDER=openai_compatible
      - SESSION_DURATION_MINUTES=${PROBE_SESSION_DURATION_MINUTES:-10}
      - REFLECTION_TIMEOUT_SECONDS=${PROBE_REFLECTION_TIMEOUT_SECONDS:-300}
      - LLM_METRICS_LOG_PATH=/app/logs/workflow-probes/${PROBE_RUN_NAME}/backend_llm_calls.jsonl
    env_file:
      - ${ENV_FILE:-.env}
    ports: []

  console-probe-runner:
    build:
      context: ./console-ui
      dockerfile: Dockerfile.probe
    container_name: therapist_console_probe
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    volumes:
      - ./console-ui/src:/app/src:delegated
      - ./console-ui/scenarios:/app/scenarios:ro
      - ./src:/app/backend-src:ro
      - ./logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app/backend-src
      - BACKEND_URL=http://api-probe:8000
      - WEBSOCKET_URL=http://api-probe:8000
      - WEBSOCKET_ORIGIN=http://localhost
      - DATABASE_PATH=/app/logs/workflow-probes/${PROBE_RUN_NAME}/runtime.sqlite
    env_file:
      - ${ENV_FILE:-.env}
    depends_on:
      api-probe:
        condition: service_healthy
    networks:
      - app-network
    command:
      - python
      - -m
      - src.workflow_probe.runner
      - --scenario
      - /app/scenarios/workflow-probes/first_session_smoke.json
      - --output-dir
      - /app/logs/workflow-probes/${PROBE_RUN_NAME}
