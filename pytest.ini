[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# Enable trio support for pytest-trio (must be true/false)
trio_mode = true
addopts =
    -v
    --tb=short
    --strict-markers
    --strict-config
markers =
    slow: marks tests as slow
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    real_llm: tests that require real external LLM services/secrets
    skip: marks tests as skipped
    asyncio: marks tests as asyncio async tests (legacy - being migrated to trio)
    trio: marks tests as trio async tests (use with pytest-trio)
    timeout: per-test timeout (pytest-timeout compatible)
