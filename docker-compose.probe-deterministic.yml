services:
  api-probe:
    command: python -m psychoanalyst_app.e2e_server
    environment:
      - APP_ENV=e2e
      - E2E_DB_PATH=/app/logs/workflow-probes/${PROBE_RUN_NAME}/runtime.sqlite
      - E2E_VECTOR_DB_PATH=/app/logs/workflow-probes/${PROBE_RUN_NAME}/vector_db
      - LLM_METRICS_LOG_PATH=/app/logs/workflow-probes/${PROBE_RUN_NAME}/backend_llm_calls.jsonl

  console-probe-runner:
    environment:
      - PROBE_DETERMINISTIC_USER=true
