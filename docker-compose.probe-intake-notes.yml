services:
  api-probe:
    command: python -m psychoanalyst_app.deterministic_server
    environment:
      APP_ENV: e2e
      E2E_DB_PATH: /app/logs/workflow-probes/${PROBE_RUN_NAME}/runtime.sqlite
      LLM_METRICS_LOG_PATH: /app/logs/workflow-probes/${PROBE_RUN_NAME}/backend_llm_calls.jsonl

  console-probe-runner:
    build:
      context: ./console-ui
      dockerfile: Dockerfile.probe
    environment:
      PROBE_DETERMINISTIC_USER: "true"
    command:
      - python
      - -m
      - src.workflow_probe.runner
      - --scenario
      - /app/scenarios/workflow-probes/intake_note_tracking.json
      - --output-dir
      - /app/logs/workflow-probes/${PROBE_RUN_NAME}
